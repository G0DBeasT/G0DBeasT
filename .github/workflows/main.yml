
name: Generate Pac-Man Animation

on:
  schedule:
    # Runs at midnight every day
    - cron: "0 0 * * *"
  workflow_dispatch: # Allows you to run it manually from the Actions tab
  push:
      branches:
          - master

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Generate Custom Pac-Man SVG
        # Put YOUR custom repository path here:
        uses: G0DBeasT/save_steve@master
        with:
          github_user_name: G0DBeasT
          games: 'pacman'

      - name: Push generated SVG to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
